<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tactical Registration | Ready Aim Learn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Agency+FB&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #e8b923; /* Gold accent color */
      --primary-dark: #c99a1a;
      --secondary: #1a1a1a; /* Dark gray/black */
      --accent: #8b0000; /* Dark red */
      --light: #e6e6e6; /* Off-white */
      --dark: #121212; /* Very dark gray */
      --gray: #4d4d4d; /* Medium gray */
      --light-gray: #333333; /* Dark gray */
      --white: #ffffff;
      --black: #000000;
      --camo-light: #5d5d5d;
      --camo-dark: #2e2e2e;
      --camo-green: #3a4a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Agency FB', 'Arial Narrow', Arial, sans-serif;
    }

    body {
      background-color: var(--dark);
      background-image: 
        linear-gradient(rgba(30, 30, 30, 0.8), rgba(30, 30, 30, 0.8)),
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--light);
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Tactical overlay pattern */
    body:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(45deg, transparent 48%, rgba(232, 185, 35, 0.1) 49%, rgba(232, 185, 35, 0.1) 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(232, 185, 35, 0.1) 49%, rgba(232, 185, 35, 0.1) 51%, transparent 52%);
      background-size: 20px 20px;
      opacity: 0.3;
      pointer-events: none;
    }

    .signup-container {
      background: linear-gradient(145deg, var(--camo-dark), var(--camo-light));
      padding: 2.5rem 2rem;
      border-radius: 4px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--primary);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Shine animation */
    .signup-container:before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to bottom right,
        transparent 45%,
        rgba(232, 185, 35, 0.1) 48%,
        rgba(232, 185, 35, 0.1) 52%,
        transparent 55%
      );
      transform: rotate(45deg);
      opacity: 0;
      animation: shine 1.5s ease;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }
      20% {
        left: 100%;
      }
      100% {
        left: 100%;
      }
    }

    h2 {
      margin-bottom: 1.5rem;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: bold;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      position: relative;
    }

    h2:after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background-color: var(--primary);
      margin: 15px auto 0;
      box-shadow: 0 0 10px rgba(232, 185, 35, 0.5);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      padding: 0.75rem 1rem;
      border: 1px solid var(--gray);
      border-radius: 4px;
      font-size: 1rem;
      background-color: rgba(30, 30, 30, 0.7);
      color: var(--light);
      outline: none;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input::placeholder {
      color: var(--gray);
      text-transform: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(232, 185, 35, 0.5);
      background-color: rgba(30, 30, 30, 0.9);
    }

    button {
      background-color: var(--primary);
      color: var(--black);
      padding: 0.75rem;
      border: none;
      border-radius: 4px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    .login-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      text-align: center;
      color: var(--gray);
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-link a:hover {
      color: var(--light);
      text-decoration: underline;
    }

    .errorlist {
      list-style-type: none;
      color: var(--accent);
      font-size: 0.8rem;
      text-align: left;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    /* Bullet hole decorations */
    .bullet-hole {
      position: absolute;
      width: 30px;
      height: 30px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23e8b923"><circle cx="12" cy="12" r="10" stroke="%238b0000" stroke-width="1"/><circle cx="12" cy="12" r="5"/></svg>');
      background-size: contain;
      opacity: 0.5;
      z-index: 0;
    }

    .bullet-hole:nth-child(1) {
      top: 15%;
      left: 15%;
    }

    .bullet-hole:nth-child(2) {
      bottom: 20%;
      right: 15%;
    }

    @media screen and (max-width: 480px) {
      .signup-container {
        padding: 2rem 1.5rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
      
      input,
      button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <!-- Bullet hole decorations -->
  <div class="bullet-hole"></div>
  <div class="bullet-hole"></div>

  <div class="signup-container">
    <h2>Request Clearance</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Submit Application</button>
    </form>
    <p class="login-link">
      Already cleared? <a href="{% url 'login' %}">Report for Duty</a>
    </p>
  </div>
</body>
</html>
